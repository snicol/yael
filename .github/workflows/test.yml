name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        run: |
          set -o pipefail
          go test -json ./... | tee report.json
      - name: Test Summary
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Go Tests
          path: report.json
          reporter: golang-json
          fail-on-error: true
